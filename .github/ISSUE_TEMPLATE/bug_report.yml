name: Bug Report
description: Report a problem with tpq
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in as much detail as you can.

  - type: input
    id: version
    attributes:
      label: Version
      description: Run `tpq --version` or provide the git commit SHA.
      placeholder: "e.g. 0.5.0 or 32216fe"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g. macOS 15, Ubuntu 24.04, Windows 11"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Provide the exact commands or actions that trigger the bug.
      placeholder: |
        1. Run `tpq` to open the TUI
        2. Type `hashicorp/aws` to filter, press `enter`
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
      placeholder: "What did you expect to happen?"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behaviour
      description: Include any error output or unexpected output.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Anything else that might help (e.g. network proxy, Go version).
