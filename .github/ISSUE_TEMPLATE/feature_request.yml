name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe the use-case clearly
        before discussing implementation details.

  - type: textarea
    id: problem
    attributes:
      label: Problem / Use-case
      description: What problem does this feature solve? Who benefits from it?
      placeholder: "I frequently need to... and currently have to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the behaviour you would like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you tried any workarounds or considered other approaches?

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Screenshots, examples, or links that help illustrate the request.
