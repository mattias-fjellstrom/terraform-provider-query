version: 2

before:
  hooks:
    - go mod download

builds:
  - id: tpq
    binary: tpq
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: tpq
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^Merge pull request"
      - "^Merge branch"

release:
  github:
    owner: mattias-fjellstrom
    name: terraform-provider-query

homebrew_casks:
  - name: tpq
    binaries:
      - tpq
    repository:
      owner: mattias-fjellstrom
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/mattias-fjellstrom/terraform-provider-query"
    description: "CLI for querying the Terraform registry for provider versions."
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "chore(cask): bump {{ .ProjectName }} to {{ .Tag }}"
